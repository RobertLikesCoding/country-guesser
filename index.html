<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Guesser</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section id="score-section" class="hidden flex-between">
        <p id="score"></p>
        <p id="lives"></p>
      </section>

      <section id="start-screen" class="game-area text-align-left">
        <h1>Welcome to Country Guesser</h1>
        <p>Here's how it works:</p>
        <ul class="rules">
          <li>There are 195 flags</li>
          <li>You get points for each correctly guessed flag</li>
          <li>
            If you make more than 3 mistakes total: <br /><br />
            You have to start over!
          </li>
        </ul>
        <button class="btn" id="start-btn">Start guessing</button>
      </section>

      <section id="game-screen" class="game-area hidden">
        <span id="flag" class="flex-center fade-in"></span>
        <h1 style="font-size: 1.5rem">Guess the country</h1>

        <div id="country-choices">
          <button class="btn option"></button>
          <button class="btn option"></button>
          <button class="btn option"></button>
        </div>

        <div style="display: flex; gap: 0.5rem">
          <button id="next-round-btn" class="btn" hidden>Next country!</button>
        </div>
      </section>

      <section id="end-screen" class="game-area hidden">
        <h1></h1>
        <p></p>
        <h2></h2>
      </section>
    </main>
    <script type="module" src="./js/script.js"></script>
  </body>
</html>
